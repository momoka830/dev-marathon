<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編集画面</title>
    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">顧客情報を入力してください</h2>
        <form id="customer-form">
            <div class="form-group">
                <label for="companyName">会社名:</label>
                <input type="text" class="form-control" id="companyName" name="companyName" required>
            </div>
            <div class="form-group">
                <label for="industry">業種:</label>
                <input type="text" class="form-control" id="industry" name="industry" required>
            </div>
            <div class="form-group">
                <label for="contact">連絡先:</label>
                <input type="text" class="form-control" id="contact" name="contact" required>
            </div>
            <div class="form-group">
                <label for="location">所在地:</label>
                <input type="text" class="form-control" id="location" name="location" required>
            </div>

            <button type="button" class="btn btn-warning" id="put-button">更新</button>
        </form>
    </div>

    <script type="module">
        import config from '../config.js';

        // URLから顧客IDを取得
        const params = new URLSearchParams(document.location.search)
        const customerId = params.get("id")

        // DBから現在の顧客情報を取得してフォームの初期値に入れる
        fetch(config.apiUrl + `customer/${customerId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("companyName").value = data.company_name
                document.getElementById("industry").value = data.industry
                document.getElementById("contact").value = data.contact
                document.getElementById("location").value = data.location
            })

        document.getElementById("put-button").addEventListener('click',
            function (event) {
                // フォームに入力された値を取得
                const companyName = document.getElementById("companyName").value
                const industry = document.getElementById("industry").value
                const contact = document.getElementById("contact").value
                const location = document.getElementById("location").value

                // APIにPUTリクエストを送って更新する
                fetch(config.apiUrl + `/customer/${customerId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        companyName: companyName,
                        industry: industry,
                        contact: contact,
                        location: location
                    })
                }).then(response => response.json())
                    .then(data => {
                        // 成功したら詳細画面に戻る
                        window.location.href = `./detail.html?id=${customerId}`
                    })
                    .catch(error => console.error(error))
            })
    </script>
    <!-- BootstrapのJavaScriptの読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
